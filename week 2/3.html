<!DOCTYPE html>
<html lang="en">
<head>
    <title>Exercise 3</title>
</head>
<body>
    <h1>Student Registration Form </h1><br>
    <form>
        <label for="name"> Student Name : </label>
        <input type="text" id="name" name="name"><br>
        <label for="email"> Email : </label>
        <input type="text" id="email" name="email"><br>
        <label for="feedback">Feedback Message</label><br>
        <textarea id="feedback" name="feedback" rows="6" cols="20"></textarea><br>
        How Satisfied are you?:<br>
        <input type="radio" id="2" name="option">
        <label for="2">Satisfied</label><br>
        <input type="radio" id="2" name="option">
        <label for="2">Neutral</label><br>
        <input type="radio" id="2" name="option">
        <label for="2">Unsatisfied</label><br>
        <button>Submit</button><br>
    </form>
</body>
</html>
